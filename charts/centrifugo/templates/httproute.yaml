{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "centrifugo.fullname" . -}}
{{- $namespace := include "centrifugo.namespace" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "centrifugo.labels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.httpRoute.parentRefs }}
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
    {{- else if .Values.gateway.create }}
    - name: {{ .Values.gateway.name | default $fullName }}
      {{- with .Values.gateway.namespace }}
      namespace: {{ . }}
      {{- end }}
    {{- else }}
    {{- fail "httpRoute.enabled is true but no Gateway is referenced: set httpRoute.parentRefs to an existing Gateway, or set gateway.create=true" }}
    {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- with .Values.httpRoute.matches }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - path:
            type: PathPrefix
            value: /
        {{- end }}
      {{- with .Values.httpRoute.timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
